<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>

<style>
body{
  background:#0d1117;
  color:#00ff9c;
  font-family: monospace;
  padding:40px;
}

#terminal{
  font-size:20px;
  line-height:1.6;
}

img{
  width:250px;
  border-radius:10px;
  margin-top:20px;
}

button{
  padding:10px 20px;
  margin-top:20px;
  font-size:16px;
  background:#ff4d6d;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>

</head>

<body>

<div id="terminal"></div>

<div id="surprise" style="display:none; text-align:center;">
<h1 style="color:white">🎂 Happy Birthday My Love ❤️</h1>

<p>You are the best husband in the world.</p>

<img src="photo.jpg">

<br>

<button onclick="celebrate()">Click for Surprise 🎉</button>

</div>

<script>

const lines = [
"> initializing birthday.exe",
"> loading memories...",
"> compiling love...",
"> building happiness...",
"> system message:",
"> Happy Birthday My Love ❤️"
]

let i = 0

function typeLine(){
  if(i < lines.length){
    document.getElementById("terminal").innerHTML += lines[i] + "<br>"
    i++
    setTimeout(typeLine,1000)
  }else{
    setTimeout(()=>{
      document.getElementById("terminal").style.display="none"
      document.getElementById("surprise").style.display="block"
    },1000)
  }
}

typeLine()

function celebrate(){
  alert("I love you forever ❤️")
}

</script>

</body>
</html>
